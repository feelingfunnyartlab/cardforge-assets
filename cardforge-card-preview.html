<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardForge — Card Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Fredoka:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Rajdhani:wght@400;500;600;700&family=Uncial+Antiqua&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow: hidden;
      background: transparent;
      /* dimensions are set via JS based on scale */
    }

    /* ═══════════════════════════════════════════════════════════
       THE CARD  —  native 300×420, scaled via transform
    ═══════════════════════════════════════════════════════════ */
    .card-render {
      width: 300px;
      height: 420px;
      position: relative;
      flex-shrink: 0;
      font-size: 14px;
      overflow: hidden;
      transform: scale(var(--preview-scale, 0.5));
      transform-origin: top left;
    }
    .card-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── FANTASY ─────────────────────────────────────────────── */
    .card-render.tpl-fantasy {
      border-radius: 14px;
      background: linear-gradient(155deg, #2c1a0a 0%, #1a0f06 55%, #0e0804 100%);
      border: 2px solid var(--card-accent, #9b59b6);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.85),
        0 0 24px var(--card-accent-glow, rgba(155,89,182,0.28)),
        inset 0 0 50px rgba(0,0,0,0.4);
      font-family: 'Cinzel', serif;
      overflow: hidden;
    }
    .card-render.tpl-fantasy .corner {
      position: absolute; width: 36px; height: 36px;
      border: 1.5px solid var(--card-accent, #9b59b6);
      opacity: 0.55; z-index: 5; pointer-events: none;
    }
    .card-render.tpl-fantasy .corner-tl { top: 7px; left: 7px; border-right: none; border-bottom: none; border-radius: 3px 0 0 0; }
    .card-render.tpl-fantasy .corner-tr { top: 7px; right: 7px; border-left: none; border-bottom: none; border-radius: 0 3px 0 0; }
    .card-render.tpl-fantasy .corner-bl { bottom: 7px; left: 7px; border-right: none; border-top: none; border-radius: 0 0 0 3px; }
    .card-render.tpl-fantasy .corner-br { bottom: 7px; right: 7px; border-left: none; border-top: none; border-radius: 0 0 3px 0; }
    .card-render.tpl-fantasy .card-header {
      padding: 16px 16px 10px;
      border-bottom: 1px solid rgba(var(--card-accent-rgb, 155,89,182), 0.25);
      background: linear-gradient(180deg, rgba(var(--card-accent-rgb, 155,89,182), 0.1) 0%, transparent 100%);
      position: relative; z-index: 2;
    }
    .card-render.tpl-fantasy .card-name {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--card-accent, #c9a96e);
      text-shadow: 0 0 14px var(--card-accent-glow, rgba(155,89,182,0.5));
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 40px;
    }
    .card-render.tpl-fantasy .card-meta {
      font-size: 0.52rem; font-family: 'Lora', serif; font-style: italic;
      color: rgba(220,185,110,0.4); letter-spacing: 0.1em; margin-top: 3px;
    }
    .card-render.tpl-fantasy .card-artwork-area {
      flex: 1; position: relative; overflow: hidden;
      margin: 8px 11px; border-radius: 6px;
      border: 1px solid rgba(var(--card-accent-rgb, 155,89,182), 0.18);
      z-index: 2;
    }
    .card-render.tpl-fantasy .card-artwork-placeholder {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: rgba(220,185,110,0.15); font-size: 0.6rem; font-family: 'Lora', serif;
      font-style: italic; letter-spacing: 0.14em;
    }
    .card-render.tpl-fantasy .card-stats {
      display: flex; padding: 8px 12px;
      border-top: 1px solid rgba(var(--card-accent-rgb, 155,89,182), 0.18);
      border-bottom: 1px solid rgba(var(--card-accent-rgb, 155,89,182), 0.18);
      position: relative; z-index: 2;
    }
    .card-render.tpl-fantasy .stat { flex: 1; display: flex; align-items: center; gap: 7px; }
    .card-render.tpl-fantasy .stat + .stat {
      border-left: 1px solid rgba(var(--card-accent-rgb, 155,89,182), 0.18); padding-left: 12px;
    }
    .card-render.tpl-fantasy .stat-icon { font-size: 0.95rem; flex-shrink: 0; }
    .card-render.tpl-fantasy .stat-value { font-size: 1.05rem; font-weight: 700; color: var(--card-accent, #c9a96e); line-height: 1; }
    .card-render.tpl-fantasy .stat-label { font-size: 0.46rem; color: rgba(220,185,110,0.35); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Lora', serif; margin-top: 1px; }
    .card-render.tpl-fantasy .card-rarity { position: absolute; top: 16px; right: 14px; display: flex; gap: 3px; z-index: 6; }
    .card-render.tpl-fantasy .rarity-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--card-accent, #c9a96e); box-shadow: 0 0 4px var(--card-accent-glow, rgba(155,89,182,0.5)); }
    .card-render.tpl-fantasy .rarity-dot.empty { background: transparent; border: 1px solid rgba(220,185,110,0.18); box-shadow: none; }

    /* ── SCI-FI ──────────────────────────────────────────────── */
    .card-render.tpl-scifi {
      border-radius: 2px;
      background: linear-gradient(155deg, #080c12 0%, #04060a 100%);
      border: 1px solid var(--card-accent, #00d4ff);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.9),
        0 0 20px var(--card-accent-glow, rgba(0,212,255,0.2)),
        inset 0 0 60px rgba(0,0,0,0.5);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
    }
    .card-render.tpl-scifi .sf-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(var(--card-accent-rgb, 0,212,255), 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(var(--card-accent-rgb, 0,212,255), 0.025) 1px, transparent 1px);
      background-size: 24px 24px;
      z-index: 0; pointer-events: none;
    }
    .card-render.tpl-scifi .sf-corner-line {
      position: absolute; top: 0; right: 0; width: 60px; height: 60px; z-index: 5; pointer-events: none; overflow: hidden;
    }
    .card-render.tpl-scifi .sf-corner-line::after {
      content: ''; position: absolute; top: 17px; right: -20px; width: 60px; height: 1px;
      background: var(--card-accent, #00d4ff); box-shadow: 0 0 4px var(--card-accent, #00d4ff);
      transform: rotate(-45deg); transform-origin: center;
    }
    .card-render.tpl-scifi .card-header {
      padding: 12px 20px 8px 14px;
      background: linear-gradient(180deg, rgba(var(--card-accent-rgb, 0,212,255), 0.07) 0%, transparent 100%);
      border-bottom: 1px solid rgba(var(--card-accent-rgb, 0,212,255), 0.2);
      position: relative; z-index: 2;
    }
    .card-render.tpl-scifi .card-name {
      font-size: 0.88rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--card-accent, #00d4ff);
      text-shadow: 0 0 12px var(--card-accent-glow, rgba(0,212,255,0.6));
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 32px;
    }
    .card-render.tpl-scifi .card-meta {
      font-size: 0.54rem; color: rgba(var(--card-accent-rgb, 0,212,255), 0.45);
      letter-spacing: 0.22em; text-transform: uppercase; margin-top: 2px;
    }
    .card-render.tpl-scifi .card-artwork-area {
      flex: 1; position: relative; overflow: hidden;
      margin: 8px 10px; border: 1px solid rgba(var(--card-accent-rgb, 0,212,255), 0.18); z-index: 2;
    }
    .card-render.tpl-scifi .card-artwork-area::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(180deg, transparent, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
      pointer-events: none; z-index: 3;
    }
    .card-render.tpl-scifi .card-artwork-placeholder {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: rgba(var(--card-accent-rgb, 0,212,255), 0.18); font-size: 0.6rem;
      letter-spacing: 0.22em; text-transform: uppercase;
    }
    .card-render.tpl-scifi .card-stats {
      display: flex; padding: 8px 10px; gap: 6px;
      border-top: 1px solid rgba(var(--card-accent-rgb, 0,212,255), 0.18);
      position: relative; z-index: 2;
    }
    .card-render.tpl-scifi .stat {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      background: rgba(var(--card-accent-rgb, 0,212,255), 0.04);
      border: 1px solid rgba(var(--card-accent-rgb, 0,212,255), 0.16);
      border-radius: 2px; padding: 5px 8px;
    }
    .card-render.tpl-scifi .stat-icon { display: none; }
    .card-render.tpl-scifi .stat-label { font-size: 0.46rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(var(--card-accent-rgb, 0,212,255), 0.45); order: -1; }
    .card-render.tpl-scifi .stat-value { font-size: 1.15rem; font-weight: 700; color: var(--card-accent, #00d4ff); text-shadow: 0 0 10px var(--card-accent-glow, rgba(0,212,255,0.6)); line-height: 1.2; }
    .card-render.tpl-scifi .card-rarity { position: absolute; top: 10px; right: 26px; display: flex; flex-direction: column; gap: 3px; align-items: flex-end; z-index: 6; }
    .card-render.tpl-scifi .rarity-dot { width: 14px; height: 2px; border-radius: 1px; background: var(--card-accent, #00d4ff); box-shadow: 0 0 5px var(--card-accent, #00d4ff); }
    .card-render.tpl-scifi .rarity-dot.empty { background: rgba(var(--card-accent-rgb, 0,212,255), 0.12); box-shadow: none; }

    /* ── NATURE ──────────────────────────────────────────────── */
    .card-render.tpl-nature {
      border-radius: 18px;
      background: linear-gradient(155deg, #f4efe6 0%, #e8e1d4 100%);
      border: 2.5px solid var(--card-accent, #82b366);
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 5px rgba(var(--card-accent-rgb, 130,179,102), 0.07);
      font-family: 'Fredoka', sans-serif; overflow: hidden;
    }
    .card-render.tpl-nature .nat-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 10% 20%, rgba(var(--card-accent-rgb, 130,179,102), 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 90% 80%, rgba(var(--card-accent-rgb, 130,179,102), 0.06) 0%, transparent 55%);
      z-index: 0; pointer-events: none;
    }
    .card-render.tpl-nature .card-header {
      padding: 14px 16px 10px;
      background: linear-gradient(180deg, rgba(var(--card-accent-rgb, 130,179,102), 0.13) 0%, transparent 100%);
      border-bottom: 1.5px solid rgba(var(--card-accent-rgb, 130,179,102), 0.22);
      position: relative; z-index: 2;
    }
    .card-render.tpl-nature .card-name {
      font-size: 0.88rem; font-weight: 600; color: #1e2e16;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.01em; padding-right: 36px;
    }
    .card-render.tpl-nature .card-meta { font-size: 0.54rem; color: rgba(var(--card-accent-rgb, 130,179,102), 0.75); letter-spacing: 0.14em; margin-top: 3px; font-style: italic; }
    .card-render.tpl-nature .card-artwork-area {
      flex: 1; position: relative; overflow: hidden;
      margin: 8px 12px; border-radius: 10px;
      border: 1.5px solid rgba(var(--card-accent-rgb, 130,179,102), 0.28); z-index: 2;
    }
    .card-render.tpl-nature .card-artwork-placeholder {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: rgba(var(--card-accent-rgb, 130,179,102), 0.3); font-size: 0.64rem; letter-spacing: 0.1em;
    }
    .card-render.tpl-nature .card-stats { display: flex; padding: 8px 12px; border-top: 1.5px solid rgba(var(--card-accent-rgb, 130,179,102), 0.2); position: relative; z-index: 2; }
    .card-render.tpl-nature .stat { flex: 1; display: flex; align-items: center; gap: 7px; }
    .card-render.tpl-nature .stat + .stat { border-left: 1.5px solid rgba(var(--card-accent-rgb, 130,179,102), 0.2); padding-left: 12px; }
    .card-render.tpl-nature .stat-icon { font-size: 0.9rem; flex-shrink: 0; }
    .card-render.tpl-nature .stat-value { font-size: 1.05rem; font-weight: 600; color: #1e2e16; line-height: 1; }
    .card-render.tpl-nature .stat-label { font-size: 0.46rem; color: rgba(var(--card-accent-rgb, 130,179,102), 0.65); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }
    .card-render.tpl-nature .card-rarity { position: absolute; top: 15px; right: 14px; display: flex; gap: 3px; z-index: 6; }
    .card-render.tpl-nature .rarity-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--card-accent, #82b366); }
    .card-render.tpl-nature .rarity-dot.empty { background: transparent; border: 1.5px solid rgba(var(--card-accent-rgb, 130,179,102), 0.3); }

    /* ── DARK / HORROR ───────────────────────────────────────── */
    .card-render.tpl-dark {
      border-radius: 6px;
      background: linear-gradient(180deg, #1e0a0a 0%, #100202 50%, #060101 100%);
      border: 1.5px solid var(--card-accent, #9b1c1c);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.96),
        0 0 30px var(--card-accent-glow, rgba(155,28,28,0.32)),
        inset 0 0 0 1px rgba(var(--card-accent-rgb, 155,28,28), 0.1),
        inset 0 50px 70px rgba(70,0,0,0.25);
      font-family: 'Uncial Antiqua', cursive; overflow: hidden;
    }
    .card-render.tpl-dark .corner { position: absolute; width: 22px; height: 22px; z-index: 5; pointer-events: none; }
    .card-render.tpl-dark .corner::before, .card-render.tpl-dark .corner::after { content: ''; position: absolute; background: var(--card-accent, #9b1c1c); opacity: 0.5; }
    .card-render.tpl-dark .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .card-render.tpl-dark .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .card-render.tpl-dark .corner-tl { top: 10px; left: 10px; }
    .card-render.tpl-dark .corner-tr { top: 10px; right: 10px; transform: scaleX(-1); }
    .card-render.tpl-dark .corner-bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
    .card-render.tpl-dark .corner-br { bottom: 10px; right: 10px; transform: scale(-1); }
    .card-render.tpl-dark .card-header {
      padding: 18px 20px 12px; text-align: center;
      border-bottom: 1px solid rgba(var(--card-accent-rgb, 155,28,28), 0.26);
      background: linear-gradient(180deg, rgba(70,0,0,0.4) 0%, transparent 100%);
      position: relative; z-index: 2;
    }
    .card-render.tpl-dark .card-name { font-size: 0.7rem; font-weight: 400; letter-spacing: 0.06em; color: var(--card-accent, #c0392b); text-shadow: 0 0 18px var(--card-accent-glow, rgba(155,28,28,0.7)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-render.tpl-dark .card-meta { font-size: 0.48rem; font-family: 'Lora', serif; font-style: italic; color: rgba(var(--card-accent-rgb, 155,28,28), 0.36); letter-spacing: 0.14em; margin-top: 5px; }
    .card-render.tpl-dark .card-artwork-area {
      flex: 1; position: relative; overflow: hidden;
      margin: 10px 12px; border-radius: 0;
      border: 1px solid rgba(var(--card-accent-rgb, 155,28,28), 0.28);
      box-shadow: inset 0 0 50px rgba(0,0,0,0.55); z-index: 2;
    }
    .card-render.tpl-dark .card-artwork-area::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.6) 100%);
      pointer-events: none; z-index: 3;
    }
    .card-render.tpl-dark .card-artwork-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(155,28,28,0.18); font-size: 0.52rem; font-family: 'Lora', serif; font-style: italic; letter-spacing: 0.2em; }
    .card-render.tpl-dark .card-stats { display: flex; justify-content: center; gap: 28px; padding: 10px 16px; border-top: 1px solid rgba(var(--card-accent-rgb, 155,28,28), 0.22); border-bottom: 1px solid rgba(var(--card-accent-rgb, 155,28,28), 0.1); position: relative; z-index: 2; }
    .card-render.tpl-dark .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .card-render.tpl-dark .stat + .stat { border-left: none; padding-left: 0; }
    .card-render.tpl-dark .stat-icon { font-size: 1rem; line-height: 1; }
    .card-render.tpl-dark .stat-value { font-size: 1.2rem; font-weight: 400; text-align: center; color: var(--card-accent, #c0392b); text-shadow: 0 0 14px var(--card-accent-glow); line-height: 1; }
    .card-render.tpl-dark .stat-label { font-size: 0.42rem; font-family: 'Lora', serif; text-align: center; color: rgba(var(--card-accent-rgb, 155,28,28), 0.3); letter-spacing: 0.12em; text-transform: uppercase; }
    .card-render.tpl-dark .card-rarity { position: absolute; top: 50%; right: 10px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 5px; z-index: 6; }
    .card-render.tpl-dark .rarity-dot { width: 7px; height: 7px; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); background: var(--card-accent, #c0392b); box-shadow: 0 0 6px var(--card-accent-glow); }
    .card-render.tpl-dark .rarity-dot.empty { background: rgba(var(--card-accent-rgb, 155,28,28), 0.1); box-shadow: none; }

    /* ── ANCIENT ─────────────────────────────────────────────── */
    .card-render.tpl-ancient {
      border-radius: 4px;
      background: linear-gradient(180deg, #3a2c18 0%, #241a0a 50%, #1a1206 100%);
      border: 2px solid var(--card-accent, #c9a96e);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.85),
        0 0 18px var(--card-accent-glow, rgba(201,169,110,0.16)),
        inset 0 0 0 3px rgba(var(--card-accent-rgb, 201,169,110), 0.06),
        inset 0 0 0 6px rgba(var(--card-accent-rgb, 201,169,110), 0.025);
      font-family: 'Cinzel', serif; overflow: hidden;
    }
    .card-render.tpl-ancient .corner { position: absolute; width: 9px; height: 9px; background: var(--card-accent, #c9a96e); opacity: 0.45; z-index: 5; pointer-events: none; }
    .card-render.tpl-ancient .corner-tl { top: 8px; left: 8px; }
    .card-render.tpl-ancient .corner-tr { top: 8px; right: 8px; }
    .card-render.tpl-ancient .corner-bl { bottom: 8px; left: 8px; }
    .card-render.tpl-ancient .corner-br { bottom: 8px; right: 8px; }
    .card-render.tpl-ancient .card-header {
      padding: 16px 20px 10px; text-align: center;
      border-bottom: 1px solid rgba(var(--card-accent-rgb, 201,169,110), 0.28);
      background: linear-gradient(180deg, rgba(var(--card-accent-rgb, 201,169,110), 0.07) 0%, transparent 100%);
      position: relative; z-index: 2;
    }
    .card-render.tpl-ancient .card-header::after {
      content: ''; display: block; width: 55%; height: 1px; margin: 8px auto 0;
      background: linear-gradient(90deg, transparent, rgba(var(--card-accent-rgb, 201,169,110), 0.42), transparent);
    }
    .card-render.tpl-ancient .card-name { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; color: var(--card-accent, #c9a96e); text-shadow: 0 1px 8px rgba(0,0,0,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-render.tpl-ancient .card-meta { font-size: 0.48rem; font-family: 'Lora', serif; font-style: italic; color: rgba(var(--card-accent-rgb, 201,169,110), 0.36); letter-spacing: 0.16em; margin-top: 4px; }
    .card-render.tpl-ancient .card-artwork-area {
      flex: 1; position: relative; overflow: hidden;
      margin: 6px 14px; border-radius: 1px;
      border-top: 1px solid rgba(var(--card-accent-rgb, 201,169,110), 0.2);
      border-bottom: 1px solid rgba(var(--card-accent-rgb, 201,169,110), 0.2);
      border-left: 4px solid rgba(var(--card-accent-rgb, 201,169,110), 0.38);
      border-right: 4px solid rgba(var(--card-accent-rgb, 201,169,110), 0.38);
      z-index: 2;
    }
    .card-render.tpl-ancient .card-artwork-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(201,169,110,0.15); font-size: 0.54rem; font-family: 'Lora', serif; font-style: italic; letter-spacing: 0.2em; }
    .card-render.tpl-ancient .card-stats { display: flex; padding: 8px 14px; gap: 8px; border-top: 1px solid rgba(var(--card-accent-rgb, 201,169,110), 0.22); position: relative; z-index: 2; }
    .card-render.tpl-ancient .stat { flex: 1; display: flex; align-items: center; gap: 7px; background: rgba(var(--card-accent-rgb, 201,169,110), 0.05); border: 1px solid rgba(var(--card-accent-rgb, 201,169,110), 0.18); border-radius: 2px; padding: 6px 8px; }
    .card-render.tpl-ancient .stat + .stat { border-left: 1px solid rgba(var(--card-accent-rgb, 201,169,110), 0.18); }

    #card-artwork-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
      z-index: 1;
    }

      /* ── Apply visual features ───────────────────────────── */
      function applyFeatures(card, tpl, artStateForTpl) {
        _ALL_FEAT_CSS.forEach(function(c) { card.classList.remove(c); });
        _ALL_ORNAMENT_IDS.forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.style.display = 'none';
        });
        var features = TEMPLATE_FEATURES[tpl] || [];
        features.forEach(function(feat) {
          if (feat.id === 'rarity-alt') return;
          var active = (artStateForTpl && artStateForTpl[feat.id] !== undefined)
            ? artStateForTpl[feat.id] : feat.def;
          if (!active) return;
          if (feat.css)    card.classList.add(feat.css);
          if (feat.domIds) feat.domIds.forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.style.display = '';
          });
        });
      }

      /* ── Apply font scales ───────────────────────────────── */
      function applyFontScales(scales) {
        if (!scales) return;
        var map = [
          { id:'card-name',    key:'name'    },
          { id:'card-meta',    key:'meta'    },
          { id:'card-power',   key:'power'   },
          { id:'card-defense', key:'defense' },
          { id:'card-rarity',  key:'rarity'  },
          { id:'card-text',    key:'text'    }
        ];
        map.forEach(function(item) {
          var el    = document.getElementById(item.id);
          var scale = scales[item.key];
          if (!el || !scale || scale === 100) return;
          var base = parseFloat(window.getComputedStyle(el).fontSize);
          el.style.fontSize = (base * scale / 100) + 'px';
        });
      }

      /* ── Main init ───────────────────────────────────────── */
      function initPreview() {
        var params = new URLSearchParams(window.location.search);

        /* 1. Resolve card data */
        var data;
        if (window.CARD_DATA) {
          data = window.CARD_DATA;
        } else {
          data = {
            name:       params.get('name')       || '',
            stage:      params.get('stage')      || '',
            rarity:     params.get('rarity')     || '',
            power:      params.get('power')      || '',
            defense:    params.get('defense')    || '',
            color:      params.get('color')      || '',
            template:   params.get('template')   || '',
            text:       params.get('text')       || '',
            card_state: params.get('card_state') || '',
            artwork:    params.get('artwork')    || '',
          };
        }

        /* 2. Scale */
        var scale = parseFloat(params.get('scale'));
        if (isNaN(scale) || scale <= 0 || scale > 3) scale = 0.5;
        document.documentElement.style.setProperty('--preview-scale', scale);
        document.body.style.width  = (300 * scale) + 'px';
        document.body.style.height = (420 * scale) + 'px';

        /* 3. Template */
        var tpl = (data.template || '').toLowerCase().trim();
        if (VALID_TPLS.indexOf(tpl) === -1) tpl = 'fantasy';
        var card = document.getElementById('card');
        card.className = 'card-render tpl-' + tpl;

        /* 4. Color */
        var raw = (data.color || '#696969').trim();
        var hex = raw.replace(/^#/, '');
        if (!/^[0-9a-fA-F]{6}$/.test(hex)) hex = '696969';
        var r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
        card.style.setProperty('--card-accent',      '#' + hex);
        card.style.setProperty('--card-accent-rgb',  r+','+g+','+b);
        card.style.setProperty('--card-accent-glow', 'rgba('+r+','+g+','+b+',0.32)');

        /* 5. Decode card_state */
        var artStateForTpl = null;
        var fontScales     = null;
        var fullArt        = false;
        var stateStr = (data.card_state || '').trim();
        if (stateStr) {
          try {
            var decoded = JSON.parse(decodeURIComponent(escape(atob(stateStr))));
            if (decoded.artState && decoded.artState[tpl]) artStateForTpl = decoded.artState[tpl];
            if (decoded.fontScales) fontScales = decoded.fontScales;
            if (decoded.fullArt)    fullArt    = true;
          } catch (e) { /* silent — use defaults */ }
        }

        /* 6. Apply features */
        applyFeatures(card, tpl, artStateForTpl);

        /* 7. Text fields */
        document.getElementById('card-name').textContent = (data.name || '').trim() || '—';
        var metaParts = [data.stage, data.rarity].filter(function(s){ return s && s.trim(); });
        document.getElementById('card-meta').textContent = metaParts.join(' · ') || '';
        document.getElementById('card-power').textContent   = (data.power   || '').toString().trim() || '—';
        document.getElementById('card-defense').textContent = (data.defense || '').toString().trim() || '—';

        /* 8. Stat icons */
        var icons = STAT_ICONS[tpl] || { power:'', defense:'' };
        document.getElementById('icon-power').textContent   = icons.power;
        document.getElementById('icon-defense').textContent = icons.defense;

        /* 9. Card text */
        var textEl = document.getElementById('card-text');
        var txt = (data.text || '').trim();
        if (txt) { textEl.textContent = txt; textEl.classList.add('has-text'); }

        /* 10. Rarity */
        var rarityEl = document.getElementById('card-rarity');
        rarityEl.innerHTML = '';
        var rarityAltActive = artStateForTpl && artStateForTpl['rarity-alt'];
        if (rarityAltActive) {
          var altSymbols = RARITY_ALT_SYMBOLS[tpl] || ['✦','✦✦','✦✦✦','✦✦✦✦'];
          var ridx = (RARITY_COUNT[data.rarity] || 1) - 1;
          rarityEl.classList.add('rarity-alt-mode');
          rarityEl.textContent = altSymbols[ridx] || altSymbols[0];
        } else {
          rarityEl.classList.remove('rarity-alt-mode');
          var count = RARITY_COUNT[data.rarity] || 1;
          for (var i = 0; i < 4; i++) {
            var dot = document.createElement('div');
            dot.className = 'rarity-dot' + (i < count ? '' : ' empty');
            rarityEl.appendChild(dot);
          }
        }

        /* 11. Artwork */
        var artUrl = (data.artwork || data.artworkFront || '').trim();
        artUrl = artUrl.replace(/^"|"$/g, '');
        if (artUrl.indexOf('//') === 0) artUrl = 'https:' + artUrl;
        if (artUrl) {
          var artImg = document.getElementById('card-artwork-img');
          artImg.src = artUrl;
          artImg.style.display = 'block';
          document.getElementById('card-art-ph').style.display = 'none';
          if (fullArt) {
            var fullBg = document.getElementById('card-full-art-bg');
            fullBg.src = artUrl;
            card.classList.add('full-art');
          }
        }

        /* 12. Font scales */
        applyFontScales(fontScales);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPreview);
      } else {
        initPreview();
      }
    })();
